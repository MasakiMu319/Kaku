# Kaku startup time budget (P95, milliseconds). Exceeding these in CI causes
# the startup-bench job to fail (currently soft-gated via continue-on-error).
#
# Both values are placeholders until a real baseline is captured. To populate:
#   1. Run `./scripts/measure_startup_kaku.sh` locally ~10 times.
#   2. Take the P95 of cold_start_ms and warm_start_ms across runs.
#   3. Multiply each by 1.2 (20% headroom for natural variance).
#   4. Replace the zeros below.
#   5. Flip the CI job from `continue-on-error: true` to a hard gate.
#
# Zero means "no enforcement yet" (check_startup_budget.sh prints a warning
# and exits 0 in that case).

cold_start_p95_ms = 0
warm_start_p95_ms = 0
